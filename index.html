<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legion RGB No Watermark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none;
        }

        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: moveSlowly 100s linear infinite;
        }

        .logo {
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;

            /* 1. 混合模式过滤黑边 */
            mix-blend-mode: screen; 
            filter: contrast(2.2) brightness(1.1);

            /* 2. 【核心修复】双重去水印大招 */
            /* 招数 A：径向遮罩，让四周边缘平滑变透明 */
            -webkit-mask-image: radial-gradient(ellipse at center, black 50%, transparent 90%);
            mask-image: radial-gradient(ellipse at center, black 50%, transparent 90%);
            
            /* 招数 B：底部硬裁切。inset(0 0 10% 0) 表示把图片底部 10% 的区域直接剪掉。
               豆包的水印就在这个范围内，剪掉后绝对看不见 */
            clip-path: inset(0 0 10% 0);

            /* 3. 呼吸动画 */
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0; transform: scale(0.97); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes moveSlowly {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10px, 15px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="1.png" id="legionLogo" class="logo">
    </div>

    <script>
        const totalImages = 14;
        let currentIndex = 1;
        const logoElement = document.getElementById('legionLogo');

        // 预加载
        function preloadNext(num) {
            const next = (num % totalImages) + 1;
            const img = new Image();
            img.src = next + ".png";
        }

        // 同步换图
        setInterval(() => {
            currentIndex = (currentIndex % totalImages) + 1;
            logoElement.src = currentIndex + ".png";
            preloadNext(currentIndex);
        }, 5000); 

        // 全屏逻辑
        document.addEventListener('click', async () => {
            const docElm = document.documentElement;
            if (!document.fullscreenElement) {
                try {
                    if (docElm.requestFullscreen) await docElm.requestFullscreen();
                    else if (docElm.webkitRequestFullscreen) await docElm.webkitRequestFullscreen();
                    
                    if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
                } catch (err) {}
            }
        });
    </script>
</body>
</html>
